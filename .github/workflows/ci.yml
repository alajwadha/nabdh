name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies (backend + shared)
        run: npm install
      - name: Install app dependencies
        run: npm install --prefix app
      - name: Typecheck (app + backend)
        run: npm run typecheck
      - name: Unit tests (app)
        run: npm test --prefix app
