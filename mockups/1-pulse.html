<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0F14;--s1:#141A21;--s2:#1A222C;--bd:#222B35;--t1:#F3F6F8;--t2:#9AA7B3;--t3:#5A6675;--mint:#36E2B4}
html,body{width:412px;height:940px;background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{padding:56px 24px 0}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.logo{font-weight:700;font-size:21px}.logo b{color:var(--mint)}
.date{color:var(--t3);font-size:12px;font-weight:600;letter-spacing:1px}
.hi{font-size:15px;color:var(--t2);margin-bottom:18px}.hi b{color:var(--t1);font-weight:600}
.hero{display:flex;flex-direction:column;align-items:center;margin-bottom:26px}
.ring{position:relative;width:228px;height:228px}
.score{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.num{font-size:70px;font-weight:300;line-height:1;letter-spacing:-3px}
.lbl{font-size:11px;letter-spacing:3px;color:var(--t2);margin-top:8px}
.state{margin-top:16px;font-size:14px;color:var(--t2)}.state b{color:var(--mint);font-weight:600}
.vit{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:15px 16px}
.cl{font-size:12px;color:var(--t3);margin-bottom:7px;letter-spacing:.3px}
.cv{font-size:25px;font-weight:600;letter-spacing:-.5px}.cv small{font-size:12px;color:var(--t3);font-weight:400;margin-left:3px}
.spark{margin-top:9px;display:block}
.coach{background:linear-gradient(135deg,rgba(54,226,180,.13),rgba(39,194,168,.04));border:1px solid rgba(54,226,180,.22);border-radius:18px;padding:15px 16px;display:flex;gap:11px;align-items:flex-start}
.coach .ic{font-size:17px;line-height:1.3}
.coach .tx{font-size:13.5px;line-height:1.5;color:var(--t1)}.coach .tx b{color:var(--mint)}
.connect{margin-top:16px;text-align:center;color:var(--t3);font-size:13px;font-weight:500}
</style></head><body><div class="wrap">
<div class="top"><div class="logo">Nabdh<b>.</b></div><div class="date">MON · 11 JUN</div></div>
<div class="hi">Good morning, <b>Ali</b></div>
<div class="hero">
 <div class="ring"><svg width="228" height="228" viewBox="0 0 228 228">
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#36E2B4"/><stop offset="1" stop-color="#1C8E78"/></linearGradient></defs>
  <circle cx="114" cy="114" r="99" fill="none" stroke="#1A222C" stroke-width="13"/>
  <circle cx="114" cy="114" r="99" fill="none" stroke="url(#g)" stroke-width="13" stroke-linecap="round" stroke-dasharray="622" stroke-dashoffset="137" transform="rotate(-90 114 114)"/>
 </svg><div class="score"><div class="num">78</div><div class="lbl">READINESS</div></div></div>
 <div class="state">Ready to push · <b>▲ 6</b> vs yesterday</div>
</div>
<div class="vit">
 <div class="card"><div class="cl">Resting HR</div><div class="cv">58<small>bpm</small></div><svg class="spark" width="148" height="24" viewBox="0 0 148 24"><polyline points="0,16 24,13 49,15 74,9 98,12 123,6 148,8" fill="none" stroke="#36E2B4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/></svg></div>
 <div class="card"><div class="cl">HRV</div><div class="cv">48<small>ms</small></div><svg class="spark" width="148" height="24" viewBox="0 0 148 24"><polyline points="0,14 24,17 49,11 74,15 98,9 123,12 148,7" fill="none" stroke="#36E2B4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/></svg></div>
 <div class="card"><div class="cl">Sleep</div><div class="cv">7.3<small>h</small></div><svg class="spark" width="148" height="24" viewBox="0 0 148 24"><polyline points="0,10 24,12 49,8 74,14 98,11 123,9 148,7" fill="none" stroke="#7C8CFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/></svg></div>
 <div class="card"><div class="cl">Steps</div><div class="cv">8,432</div><svg class="spark" width="148" height="24" viewBox="0 0 148 24"><polyline points="0,18 24,15 49,16 74,11 98,13 123,8 148,5" fill="none" stroke="#36E2B4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".75"/></svg></div>
</div>
<div class="coach"><div class="ic">💡</div><div class="tx"><b>Heads up —</b> your sleep dipped 3 nights running. Go lighter on training today and aim for an earlier night.</div></div>
<div class="connect">Connect a device ›</div>
</div></body></html>
