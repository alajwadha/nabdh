<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080B10;--t1:#FFFFFF;--t2:#AEB8C4;--t3:#6A7682;--glass:rgba(255,255,255,.07);--bd:rgba(255,255,255,.12)}
html,body{width:412px;height:940px;background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.wrap{padding:54px 22px 0}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(.94) translateY(10px)}60%{opacity:1;transform:scale(1.01)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes chip{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}
@keyframes fade{to{opacity:1}}
@keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.top,.hero,.chip,.gc,.coach{opacity:0}
body.go .top{animation:fadeDown .6s ease-out forwards}
body.go .hero{animation:pop .75s .05s cubic-bezier(.22,1,.36,1) forwards, flow 7s 1s ease-in-out infinite}
body.go .chip{animation:chip .55s ease-out forwards}
body.go .chip:nth-child(1){animation-delay:.5s}body.go .chip:nth-child(2){animation-delay:.6s}body.go .chip:nth-child(3){animation-delay:.7s}
body.go .gc{animation:fadeUp .6s ease-out forwards}
body.go .grid .gc:nth-child(1){animation-delay:.8s}body.go .grid .gc:nth-child(2){animation-delay:.9s}body.go .grid .gc:nth-child(3){animation-delay:1.0s}
body.go .coach{animation:fadeUp .6s 1.15s ease-out forwards}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-weight:700;font-size:21px}.logo b{color:#36E2B4}
.date{color:var(--t3);font-size:12px;font-weight:600;letter-spacing:1px}
.hero{position:relative;border-radius:28px;padding:26px;overflow:hidden;background:linear-gradient(135deg,#0FB89A 0%,#1FA0C6 48%,#6D6BE6 100%);background-size:200% 200%;margin-bottom:16px;box-shadow:0 20px 50px -20px rgba(31,160,198,.6)}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 80% 0%,rgba(255,255,255,.25),transparent 60%)}
.hl{position:relative;font-size:12px;letter-spacing:2px;opacity:.85;font-weight:600}
.hn{position:relative;font-size:82px;font-weight:600;letter-spacing:-3px;line-height:1;margin-top:6px}
.hs{position:relative;font-size:14px;opacity:.9;margin-top:6px}
.hr{position:relative;display:flex;gap:10px;margin-top:22px}
.chip{flex:1;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:12px}
.ck{font-size:11px;opacity:.85}.cvv{font-size:20px;font-weight:700;margin-top:3px}.cvv small{font-size:11px;opacity:.8;font-weight:400}
.grid{display:flex;gap:12px;margin-bottom:16px}
.gc{flex:1;background:var(--glass);border:1px solid var(--bd);border-radius:20px;padding:16px}
.gk{font-size:12px;color:var(--t3);margin-bottom:8px}
.gv{font-size:24px;font-weight:600;letter-spacing:-.5px}.gv small{font-size:12px;color:var(--t3);font-weight:400}
.coach{background:var(--glass);border:1px solid var(--bd);border-radius:20px;padding:16px;display:flex;gap:11px;align-items:flex-start}
.coach .ic{font-size:17px}.coach .tx{font-size:13.5px;line-height:1.5;color:var(--t2)}.coach .tx b{color:#36E2B4}
</style></head><body>
<div class="wrap">
<div class="top"><div class="logo">Nabdh<b>.</b></div><div class="date">MON · 11 JUN</div></div>
<div class="hero">
 <div class="hl">READINESS</div>
 <div class="hn" id="num">0</div>
 <div class="hs">Ready to push · ▲ 6 vs yesterday</div>
 <div class="hr">
  <div class="chip"><div class="ck">Steps</div><div class="cvv">8,432</div></div>
  <div class="chip"><div class="ck">Energy</div><div class="cvv">612<small> kcal</small></div></div>
  <div class="chip"><div class="ck">Sleep</div><div class="cvv">7.3<small> h</small></div></div>
 </div>
</div>
<div class="grid">
 <div class="gc"><div class="gk">Resting HR</div><div class="gv">58<small> bpm</small></div></div>
 <div class="gc"><div class="gk">HRV</div><div class="gv">48<small> ms</small></div></div>
 <div class="gc"><div class="gk">SpO₂</div><div class="gv">98<small> %</small></div></div>
</div>
<div class="coach"><div class="ic">💡</div><div class="tx"><b>Coach —</b> sleep dipped 3 nights. Go lighter today; I've eased your plan and set a suhoor hydration reminder.</div></div>
</div>
<script>
window.NABDH=(function(){var raf;
 function startCount(){cancelAnimationFrame(raf);var el=document.getElementById('num');el.textContent='0';var start=performance.now(),dur=1300,delay=300,target=78;
  (function tick(now){var t=Math.min(1,Math.max(0,(now-start-delay)/dur));var e=1-Math.pow(1-t,3);el.textContent=Math.round(e*target);if(t<1)raf=requestAnimationFrame(tick);})(performance.now());}
 function play(){var b=document.body;b.classList.remove('go');void b.offsetWidth;b.classList.add('go');startCount();}
 return {play:play};})();
(document.fonts&&document.fonts.ready)?document.fonts.ready.then(window.NABDH.play):window.addEventListener('load',window.NABDH.play);
</script>
</body></html>
