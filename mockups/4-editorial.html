<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0D11;--t1:#F4F6F8;--t2:#8A95A1;--t3:#4E5965;--mint:#36E2B4;--bd:#1C232B}
html,body{width:412px;height:940px;background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{padding:64px 32px 0}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:80px}
.logo{font-weight:500;font-size:18px;letter-spacing:4px}
.date{color:var(--t3);font-size:11px;letter-spacing:2px;font-weight:500}
.kicker{font-size:11px;letter-spacing:4px;color:var(--mint);font-weight:600;margin-bottom:18px}
.big{font-size:140px;font-weight:200;letter-spacing:-6px;line-height:.82}
.unit{font-size:12px;letter-spacing:3px;color:var(--t2);margin-top:18px}
.line{margin:46px 0;height:1px;background:var(--bd)}
.metrics{display:flex;justify-content:space-between}
.m{}
.mk{font-size:10px;letter-spacing:2px;color:var(--t3);margin-bottom:8px}
.mv{font-size:22px;font-weight:300;letter-spacing:-.5px}
.mv small{font-size:11px;color:var(--t3)}
.insight{margin-top:90px;font-size:17px;font-weight:300;line-height:1.55;color:var(--t2)}
.insight b{color:var(--t1);font-weight:500}
.foot{position:absolute;bottom:40px;left:32px;color:var(--t3);font-size:12px;letter-spacing:1px}
</style></head><body><div class="wrap">
<div class="top"><div class="logo">N A B D H</div><div class="date">11 · 06 · 2026</div></div>
<div class="kicker">TODAY'S READINESS</div>
<div class="big">78</div>
<div class="unit">OUT OF 100 — READY TO PUSH</div>
<div class="line"></div>
<div class="metrics">
 <div class="m"><div class="mk">STEPS</div><div class="mv">8,432</div></div>
 <div class="m"><div class="mk">SLEEP</div><div class="mv">7.3<small>h</small></div></div>
 <div class="m"><div class="mk">HRV</div><div class="mv">48<small>ms</small></div></div>
 <div class="m"><div class="mk">REST HR</div><div class="mv">58</div></div>
</div>
<div class="insight"><b>Your body is recovered.</b> A strong day for effort — keep it before the afternoon heat, and hydrate well.</div>
</div><div class="foot">CONNECT A DEVICE →</div></body></html>
