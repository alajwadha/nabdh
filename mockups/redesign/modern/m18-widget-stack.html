<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:Inter,system-ui,sans-serif;padding:36px 0 30px;display:flex;flex-direction:column;align-items:center;gap:12px;-webkit-font-smoothing:antialiased}
.meta{color:#8A8A95;font-size:11px;letter-spacing:2px;font-weight:600}.meta b{color:#fff}
.ph{width:390px;height:844px;border-radius:42px;overflow:hidden;position:relative;background:#000;box-shadow:0 30px 70px rgba(0,0,0,.8),0 0 0 1px #1C1C22}
.in{padding:60px 18px 0;height:100%;display:flex;flex-direction:column;color:#fff;gap:14px}
.clock{display:flex;justify-content:space-between;align-items:baseline;padding:0 8px}
.clock b{font-size:24px;font-weight:700;letter-spacing:-.5px}
.clock span{font-size:12px;color:#6E6E78;font-weight:600;letter-spacing:1.6px}
.w{border-radius:34px;padding:24px;position:relative;overflow:hidden}
.w1{background:linear-gradient(150deg,#1E3A33,#0E1C18);flex:1.25;display:flex;flex-direction:column}
.w1 .glow{position:absolute;right:-60px;bottom:-60px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle,rgba(54,226,180,.25),transparent 70%)}
.wl{font-size:12px;letter-spacing:2px;font-weight:700;color:rgba(255,255,255,.55)}
.w1 .n{font-size:118px;font-weight:800;letter-spacing:-6px;line-height:.95;margin-top:auto;color:#5EEAD4}
.w1 .s{font-size:16px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:4px}
.w2{background:linear-gradient(150deg,#2A2440,#15121F);flex:1;display:flex;align-items:center;gap:22px}
.w2 .n{font-size:74px;font-weight:800;letter-spacing:-3px;line-height:1;color:#A78BFA}
.w2 .n small{font-size:22px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:0}
.w2 .col .s{font-size:14.5px;color:rgba(255,255,255,.8);font-weight:600;margin-top:6px;line-height:1.4}
.w3{background:linear-gradient(150deg,#33231C,#1A110C);flex:1;display:flex;flex-direction:column;justify-content:space-between}
.w3 p{font-size:17px;font-weight:600;line-height:1.45;color:#FFD9B8;max-width:300px}
.w3 p b{color:#FFB45C}
.dots{display:flex;gap:7px;justify-content:center;padding:4px 0 18px}
.dots i{width:7px;height:7px;border-radius:50%;background:#2E2E36}
.dots i.on{background:#fff}
</style></head><body>
<div class="meta">OPTION 18 · <b>WIDGET STACK</b> · inspired by iOS StandBy / Smart Stack</div>
<div class="ph"><div class="in">
 <div class="clock"><b>13:48</b><span>THU JUN 11 · نبض</span></div>
 <div class="w w1"><div class="glow"></div>
  <div class="wl">READINESS</div>
  <div class="n">64</div>
  <div class="s">Recovery day — HRV down 3 nights</div>
 </div>
 <div class="w w2">
  <div class="n">7:18<small>h</small></div>
  <div class="col"><div class="wl">SLEEP</div><div class="s">+22 min vs your average.<br>Deep sleep improved.</div></div>
 </div>
 <div class="w w3">
  <div class="wl">COACH · NEXT UP</div>
  <p>Easy walk <b>after Asr</b>, dinner <b>≤ 500 kcal</b>, lights out <b>11:15</b>.</p>
 </div>
 <div class="dots"><i class="on"></i><i></i><i></i><i></i></div>
</div></div>
</body></html>
