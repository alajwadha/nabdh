<!doctype html><html><head><meta charset="utf-8">
<style>
:root{--bg:#F7F1E8;--card:#FFFBF4;--bord:#EDE5D3;--navbg:#EFE8DA;--grn:#2E7D5B;--mut:#80796C;--ink:#1F1C17}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#E5DECF;font-family:'Plus Jakarta Sans',system-ui,sans-serif;display:flex;gap:24px;padding:30px}
.card{background:var(--card);border:2px solid var(--bord);border-radius:26px;padding:16px;width:300px}
.lbl{font-size:10px;letter-spacing:1.4px;font-weight:800;color:var(--mut);margin-bottom:8px}
.stage{background:var(--navbg);border-radius:18px;height:140px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.name{font-size:15px;font-weight:800;margin-top:12px;color:var(--ink)}
/* runner: authored in a 116px box, parts are green segments */
.runner{position:relative;width:116px;height:116px}
.seg{position:absolute;border-radius:99px;background:var(--grn)}
.ground{left:9px;right:9px;bottom:16px;height:3px;background:var(--navbg);position:absolute;border-radius:99px}
.hips{position:absolute;left:48px;top:58px}
.shoulders{position:absolute;left:50px;top:23px}
.head{position:absolute;left:5px;top:-14px;width:18px;height:18px;border-radius:99px;background:var(--grn)}
/* mid-stride pose (representative frame) + subtle live animation */
/* paused at the 25% (max-spread) keyframe so the still frame clearly reads as a stride */
.legB{width:7px;height:36px;left:0;top:0;transform-origin:top center;animation:legB .76s linear infinite -.19s paused}
.legF{width:7px;height:36px;left:6px;top:0;transform-origin:top center;animation:legF .76s linear infinite -.19s paused}
.torso{width:9px;height:34px;left:2px;top:6px;transform:rotate(10deg)}
.armB{width:6px;height:26px;left:3px;top:4px;transform-origin:top center;animation:armB .76s linear infinite -.19s paused}
.armF{width:6px;height:26px;left:8px;top:4px;transform-origin:top center;animation:armF .76s linear infinite -.19s paused}
@keyframes legF{0%,100%{transform:rotate(0)}25%{transform:rotate(32deg)}75%{transform:rotate(-32deg)}}
@keyframes legB{0%,100%{transform:rotate(0)}25%{transform:rotate(-32deg)}75%{transform:rotate(32deg)}}
@keyframes armF{0%,100%{transform:rotate(0)}25%{transform:rotate(-26deg)}75%{transform:rotate(26deg)}}
@keyframes armB{0%,100%{transform:rotate(0)}25%{transform:rotate(26deg)}75%{transform:rotate(-26deg)}}
/* emoji-pulse fallback — the sport's own emoji, gently pulsing */
.pulse{font-size:48px;animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(.9);opacity:.7}50%{transform:scale(1.06);opacity:1}}
/* bench press: lying figure pressing a barbell up via a 2-seg arm */
.bp{position:relative;width:116px;height:116px}
.bp b{position:absolute;border-radius:99px;background:var(--grn)}
.bp .ground{left:8px;right:8px;bottom:12px;height:3px;background:var(--navbg)}
.bp .bench{left:16px;top:74px;width:66px;height:7px}
.bp .lA{left:22px;top:81px;width:6px;height:18px;background:var(--navbg)}
.bp .lB{left:72px;top:81px;width:6px;height:18px;background:var(--navbg)}
.bp .head{left:12px;top:58px;width:16px;height:16px}
.bp .torso{left:26px;top:66px;width:38px;height:10px} /* lying on bench */
.bp .thigh{left:62px;top:68px;width:18px;height:9px;transform-origin:left center;transform:rotate(46deg)}
.bp .shin{left:18px;top:0;width:18px;height:9px;transform-origin:left center;transform:rotate(58deg)} /* child of thigh */
.bp .uarm{left:36px;top:64px;width:17px;height:9px;transform-origin:left center;transform:rotate(-80deg)}
.bp .farm{left:17px;top:0;width:16px;height:9px;transform-origin:left center;transform:rotate(-4deg)} /* child of uarm */
.bp .bar{left:-15px;top:-3px;width:42px;height:6px} /* child of farm: barbell across hands */
.bp .plL{left:-19px;top:-9px;width:8px;height:18px;border-radius:3px}
.bp .plR{left:19px;top:-9px;width:8px;height:18px;border-radius:3px}
/* squat: side figure, barbell on back, jointed legs bending deep */
.sq{position:relative;width:116px;height:116px}
.sq b{position:absolute;border-radius:99px;background:var(--grn)}
.sq .ground{left:8px;right:8px;bottom:14px;height:3px;background:var(--navbg)}
.sq .head{left:34px;top:24px;width:17px;height:17px}
.sq .bar{left:24px;top:34px;width:42px;height:6px}
.sq .plL{left:22px;top:28px;width:8px;height:18px;border-radius:3px}
.sq .plR{left:60px;top:28px;width:8px;height:18px;border-radius:3px}
.sq .torso{left:52px;top:64px;width:30px;height:10px;transform-origin:left center;transform:rotate(-118deg)} /* hip→shoulder lean */
.sq .thigh{left:52px;top:64px;width:23px;height:11px;transform-origin:left center;transform:rotate(24deg)}
.sq .shin{left:23px;top:0;width:23px;height:11px;transform-origin:left center;transform:rotate(66deg)} /* child of thigh */
.sq .foot{left:18px;top:-3px;width:15px;height:8px;border-radius:3px} /* child of shin */
/* leg press: reclined figure, jointed leg pressing a footplate (horizontal bones) */
.lp{position:relative;width:116px;height:116px}
.lp b{position:absolute;border-radius:99px;background:var(--grn)}
.lp .ground{left:8px;right:8px;bottom:16px;height:3px;background:var(--navbg)}
.lp .head{left:14px;top:40px;width:18px;height:18px}
.lp .torso{left:18px;top:58px;width:34px;height:9px;transform-origin:left center;transform:rotate(-12deg)} /* reclined back */
.lp .thigh{left:46px;top:60px;width:24px;height:9px;transform-origin:left center;transform:rotate(-20deg)}
.lp .shin{left:24px;top:0;width:24px;height:9px;transform-origin:left center;transform:rotate(16deg)} /* child of thigh */
.lp .foot{left:22px;top:-15px;width:8px;height:34px;border-radius:5px;background:var(--grn)} /* child of shin: footplate */
</style></head><body>
<div class="card">
 <div class="lbl">WORKOUT · SPORTS · RUNNING</div>
 <div class="stage">
  <div class="runner">
   <div class="ground"></div>
   <div class="hips"><div class="seg legB"></div><div class="seg legF"></div></div>
   <div class="shoulders"><div class="seg torso"></div><div class="head"></div><div class="seg armB"></div><div class="seg armF"></div></div>
  </div>
 </div>
 <div class="name">🏃 Running</div>
</div>
<div class="card">
 <div class="lbl">WORKOUT · GYM · LEG PRESS</div>
 <div class="stage">
  <div class="lp">
   <b class="ground"></b>
   <b class="head"></b>
   <b class="torso"></b>
   <b class="thigh"><b class="shin"><b class="foot"></b></b></b>
  </div>
 </div>
 <div class="name">🦵 Leg press</div>
</div>
<div class="card">
 <div class="lbl">WORKOUT · GYM · SQUAT</div>
 <div class="stage">
  <div class="sq">
   <b class="ground"></b>
   <b class="head"></b>
   <b class="bar"></b><b class="plL"></b><b class="plR"></b>
   <b class="torso"></b>
   <b class="thigh"><b class="shin"><b class="foot"></b></b></b>
  </div>
 </div>
 <div class="name">🏋️ Squat</div>
</div>
<div class="card">
 <div class="lbl">WORKOUT · GYM · BENCH PRESS</div>
 <div class="stage">
  <div class="bp">
   <b class="ground"></b><b class="lA"></b><b class="lB"></b><b class="bench"></b>
   <b class="head"></b><b class="torso"></b>
   <b class="thigh"><b class="shin"></b></b>
   <b class="uarm"><b class="farm"><b class="bar"></b><b class="plL"></b><b class="plR"></b></b></b>
  </div>
 </div>
 <div class="name">🏋️ Bench press</div>
</div>
<div class="card">
 <div class="lbl">FALLBACK · SPORT EMOJI PULSE</div>
 <div class="stage"><div class="pulse">🎾</div></div>
 <div class="name">🎾 Padel (until drawn)</div>
</div>
</body></html>
