<!doctype html><html><head><meta charset="utf-8">
<style>
:root{--bg:#F7F1E8;--card:#FFFBF4;--bord:#EDE5D3;--navbg:#EFE8DA;--grn:#2E7D5B;--mut:#80796C;--ink:#1F1C17}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#E5DECF;font-family:'Plus Jakarta Sans',system-ui,sans-serif;display:flex;gap:24px;padding:30px}
.card{background:var(--card);border:2px solid var(--bord);border-radius:26px;padding:16px;width:300px}
.lbl{font-size:10px;letter-spacing:1.4px;font-weight:800;color:var(--mut);margin-bottom:8px}
.stage{background:var(--navbg);border-radius:18px;height:140px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.name{font-size:15px;font-weight:800;margin-top:12px;color:var(--ink)}
/* runner: authored in a 116px box, parts are green segments */
.runner{position:relative;width:116px;height:116px}
.seg{position:absolute;border-radius:99px;background:var(--grn)}
.ground{left:9px;right:9px;bottom:16px;height:3px;background:var(--navbg);position:absolute;border-radius:99px}
.hips{position:absolute;left:48px;top:58px}
.shoulders{position:absolute;left:50px;top:23px}
.head{position:absolute;left:5px;top:-14px;width:18px;height:18px;border-radius:99px;background:var(--grn)}
/* mid-stride pose (representative frame) + subtle live animation */
/* paused at the 25% (max-spread) keyframe so the still frame clearly reads as a stride */
.legB{width:7px;height:36px;left:0;top:0;transform-origin:top center;animation:legB .76s linear infinite -.19s paused}
.legF{width:7px;height:36px;left:6px;top:0;transform-origin:top center;animation:legF .76s linear infinite -.19s paused}
.torso{width:9px;height:34px;left:2px;top:6px;transform:rotate(10deg)}
.armB{width:6px;height:26px;left:3px;top:4px;transform-origin:top center;animation:armB .76s linear infinite -.19s paused}
.armF{width:6px;height:26px;left:8px;top:4px;transform-origin:top center;animation:armF .76s linear infinite -.19s paused}
@keyframes legF{0%,100%{transform:rotate(0)}25%{transform:rotate(32deg)}75%{transform:rotate(-32deg)}}
@keyframes legB{0%,100%{transform:rotate(0)}25%{transform:rotate(-32deg)}75%{transform:rotate(32deg)}}
@keyframes armF{0%,100%{transform:rotate(0)}25%{transform:rotate(-26deg)}75%{transform:rotate(26deg)}}
@keyframes armB{0%,100%{transform:rotate(0)}25%{transform:rotate(26deg)}75%{transform:rotate(-26deg)}}
/* emoji-pulse fallback — the sport's own emoji, gently pulsing */
.pulse{font-size:48px;animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(.9);opacity:.7}50%{transform:scale(1.06);opacity:1}}
/* lat pulldown: seated, pulling a cable bar down to the chest (mid-pull pose) */
.lat{position:relative;width:116px;height:116px}
.lat b{position:absolute;border-radius:99px;background:var(--grn)}
.lat .pulley{position:absolute;left:50px;top:6px;width:16px;height:16px;border:4px solid var(--mut);border-radius:99px}
.lat .cable{left:56px;top:14px;width:4px;height:26px;background:var(--mut)}
.lat .pbar{left:42px;top:38px;width:34px;height:5px;background:var(--mut)}
.lat .seat{left:34px;top:78px;width:22px;height:6px;background:var(--mut)}
.lat .pad{left:48px;top:71px;width:24px;height:6px;background:var(--mut)}
.lat .head{left:42px;top:34px;width:16px;height:16px}
.lat .torso{left:48px;top:50px;width:10px;height:26px}
.lat .thigh{left:46px;top:76px;width:22px;height:9px;transform-origin:left center;transform:rotate(8deg)}
.lat .shin{left:22px;top:0;width:20px;height:9px;transform-origin:left center;transform:rotate(72deg)}
.lat .uarm{left:52px;top:50px;width:12px;height:8px;transform-origin:left center;transform:rotate(4deg)}
.lat .farm{left:12px;top:0;width:12px;height:8px;transform-origin:left center;transform:rotate(-119deg)}
/* bicep curl: standing, upper arm at side, forearm curling a dumbbell up */
.cu{position:relative;width:116px;height:116px}
.cu b{position:absolute;border-radius:99px;background:var(--grn)}
.cu .ground{left:8px;right:8px;bottom:12px;height:3px;background:var(--navbg)}
.cu .head{left:44px;top:16px;width:17px;height:17px}
.cu .torso{left:49px;top:34px;width:10px;height:32px}
.cu .legF{left:54px;top:66px;width:9px;height:28px;transform-origin:top center;transform:rotate(5deg)}
.cu .legB{left:49px;top:66px;width:9px;height:28px;transform-origin:top center;transform:rotate(-5deg)}
.cu .uarm{left:54px;top:36px;width:9px;height:22px;transform-origin:top center}
.cu .forearm{left:54px;top:56px;width:18px;height:9px;transform-origin:left center;transform:rotate(-22deg)}
.cu .dbbar{left:64px;top:47px;width:18px;height:5px}
.cu .dbL{left:62px;top:43px;width:7px;height:13px;border-radius:2px}
.cu .dbR{left:78px;top:43px;width:7px;height:13px;border-radius:2px}
/* pull-up: hang from a fixed bar, arms bent (near-top pose), body raised */
.pu{position:relative;width:116px;height:116px}
.pu b{position:absolute;border-radius:99px;background:var(--grn)}
.pu .bar{left:28px;top:22px;width:60px;height:5px;background:var(--mut)}
.pu .postL{left:28px;top:22px;width:5px;height:16px;background:var(--mut)}
.pu .postR{left:83px;top:22px;width:5px;height:16px;background:var(--mut)}
.pu .head{left:50px;top:28px;width:16px;height:16px}
.pu .torso{left:53px;top:43px;width:10px;height:26px}
.pu .thigh{left:58px;top:67px;width:18px;height:9px;transform-origin:left center;transform:rotate(82deg)}
.pu .shin{left:18px;top:0;width:18px;height:9px;transform-origin:left center;transform:rotate(-14deg)}
.pu .uarm{left:58px;top:43px;width:14px;height:8px;transform-origin:left center;transform:rotate(-47deg)}
.pu .farm{left:14px;top:0;width:13px;height:8px;transform-origin:left center;transform:rotate(-91deg)}
.pu .grip{left:11px;top:-3px;width:8px;height:6px}
/* cycling: figure on a bike, IK legs on the pedals (static frame: 2 pedal positions) */
.cy{position:relative;width:116px;height:116px}
.cy b{position:absolute;border-radius:99px;background:var(--grn)}
.cy .tube{position:absolute;height:4px;background:var(--mut);transform-origin:left center;border-radius:99px}
.cy .wheel{position:absolute;border:4px solid var(--mut);border-radius:99px}
.cy .wR{left:11px;top:71px;width:30px;height:30px}
.cy .wF{left:75px;top:71px;width:30px;height:30px}
.cy .chainstay{left:58px;top:72px;width:35px;transform:rotate(156deg)}
.cy .seattube{left:58px;top:72px;width:28px;transform:rotate(-120deg)}
.cy .downtube{left:58px;top:72px;width:34px;transform:rotate(-50deg)}
.cy .fork{left:80px;top:46px;width:41px;transform:rotate(76deg)}
.cy .toptube{left:44px;top:48px;width:36px;transform:rotate(-3deg)}
.cy .crank{left:55px;top:69px;width:7px;height:7px;background:var(--mut)}
.cy .head{left:56px;top:22px;width:15px;height:15px}
.cy .torso{left:44px;top:48px;width:22px;height:9px;transform-origin:left center;transform:rotate(-34deg)}
.cy .arm{left:62px;top:32px;width:20px;height:7px;transform-origin:left center;transform:rotate(40deg)}
.cy .thighA{left:44px;top:48px;width:22px;height:8px;transform-origin:left center;transform:rotate(25deg)}
.cy .shinA{left:22px;top:0;width:22px;height:8px;transform-origin:left center;transform:rotate(59deg)}
.cy .footA{left:18px;top:-2px;width:11px;height:6px;border-radius:3px}
.cy .thighB{left:44px;top:48px;width:22px;height:8px;transform-origin:left center;transform:rotate(6deg)}
.cy .shinB{left:22px;top:0;width:22px;height:8px;transform-origin:left center;transform:rotate(132deg)}
.cy .footB{left:18px;top:-2px;width:11px;height:6px;border-radius:3px}
/* rowing (erg): seated, leaning back at the finish, handle pulled to the chest */
.row{position:relative;width:116px;height:116px}
.row b{position:absolute;border-radius:99px;background:var(--grn)}
.row .rail{left:8px;right:8px;bottom:18px;height:4px;background:var(--navbg)}
.row .fly{left:88px;top:48px;width:22px;height:22px;border-radius:99px;background:var(--navbg)}
.row .foot{left:84px;top:62px;width:6px;height:18px;background:var(--navbg)}
.row .seat{left:34px;top:74px;width:18px;height:6px;background:var(--navbg)}
.row .head{left:20px;top:30px;width:16px;height:16px}
.row .torso{left:44px;top:70px;width:30px;height:10px;transform-origin:left center;transform:rotate(-124deg)} /* lean back (up-left) */
.row .thigh{left:44px;top:70px;width:24px;height:9px;transform-origin:left center;transform:rotate(2deg)} /* extended right */
.row .shin{left:24px;top:0;width:20px;height:9px;transform-origin:left center;transform:rotate(-4deg)} /* to footplate */
.row .uarm{left:30px;top:46px;width:14px;height:8px;transform-origin:left center;transform:rotate(-8deg)} /* shoulder→elbow toward right */
.row .farm{left:14px;top:0;width:15px;height:8px;transform-origin:left center;transform:rotate(34deg)} /* elbow→handle at chest */
.row .handle{left:13px;top:-5px;width:6px;height:16px} /* child of farm */
.row .cable{left:99px;top:57.5px;width:43px;height:3px;background:var(--navbg);transform-origin:left center;transform:rotate(191deg)}
/* overhead press: standing figure pressing a bar overhead (top/lockout pose) */
.ohp{position:relative;width:116px;height:116px}
.ohp b{position:absolute;border-radius:99px;background:var(--grn)}
.ohp .ground{left:8px;right:8px;bottom:12px;height:3px;background:var(--navbg)}
.ohp .head{left:40px;top:30px;width:17px;height:17px}
.ohp .torso{left:49px;top:46px;width:10px;height:32px}
.ohp .legF{left:54px;top:76px;width:9px;height:24px;transform-origin:top center;transform:rotate(5deg)}
.ohp .legB{left:49px;top:76px;width:9px;height:24px;transform-origin:top center;transform:rotate(-5deg)}
.ohp .uarm{left:54px;top:48px;width:9px;height:18px;transform-origin:left center;transform:rotate(-84deg)} /* up */
.ohp .farm{left:18px;top:0;width:9px;height:16px;transform-origin:left center;transform:rotate(-6deg)} /* child: continue up */
.ohp .bar{left:-15px;top:-3px;width:40px;height:6px} /* child of farm: overhead bar */
.ohp .plL{left:-19px;top:-9px;width:8px;height:18px;border-radius:3px}
.ohp .plR{left:17px;top:-9px;width:8px;height:18px;border-radius:3px}
/* deadlift: hip-hinge figure, straight arms, bar rising off the floor */
.dl{position:relative;width:116px;height:116px}
.dl b{position:absolute;border-radius:99px;background:var(--grn)}
.dl .ground{left:8px;right:8px;bottom:12px;height:3px;background:var(--navbg)}
.dl .thigh{left:48px;top:54px;width:21px;height:11px;transform-origin:left center;transform:rotate(74deg)}
.dl .shin{left:21px;top:0;width:21px;height:11px;transform-origin:left center;transform:rotate(10deg)} /* child of thigh */
.dl .torso{left:48px;top:54px;width:27px;height:11px;transform-origin:left center;transform:rotate(-44deg)} /* hinge */
.dl .head{left:69px;top:20px;width:16px;height:16px}
.dl .arm{left:69px;top:36px;width:9px;height:24px} /* straight down from shoulder */
.dl .bar{left:58px;top:58px;width:34px;height:6px}
.dl .plL{left:55px;top:50px;width:19px;height:19px;border-radius:99px}
.dl .plR{left:76px;top:50px;width:19px;height:19px;border-radius:99px}
/* bench press: lying figure pressing a barbell up via a 2-seg arm */
.bp{position:relative;width:116px;height:116px}
.bp b{position:absolute;border-radius:99px;background:var(--grn)}
.bp .ground{left:8px;right:8px;bottom:12px;height:3px;background:var(--navbg)}
.bp .bench{left:16px;top:74px;width:66px;height:7px}
.bp .lA{left:22px;top:81px;width:6px;height:18px;background:var(--navbg)}
.bp .lB{left:72px;top:81px;width:6px;height:18px;background:var(--navbg)}
.bp .head{left:12px;top:58px;width:16px;height:16px}
.bp .torso{left:26px;top:66px;width:38px;height:10px} /* lying on bench */
.bp .thigh{left:62px;top:68px;width:18px;height:9px;transform-origin:left center;transform:rotate(46deg)}
.bp .shin{left:18px;top:0;width:18px;height:9px;transform-origin:left center;transform:rotate(58deg)} /* child of thigh */
.bp .uarm{left:36px;top:64px;width:17px;height:9px;transform-origin:left center;transform:rotate(-80deg)}
.bp .farm{left:17px;top:0;width:16px;height:9px;transform-origin:left center;transform:rotate(-4deg)} /* child of uarm */
.bp .bar{left:-15px;top:-3px;width:42px;height:6px} /* child of farm: barbell across hands */
.bp .plL{left:-19px;top:-9px;width:8px;height:18px;border-radius:3px}
.bp .plR{left:19px;top:-9px;width:8px;height:18px;border-radius:3px}
/* squat: side figure, barbell on back, jointed legs bending deep */
.sq{position:relative;width:116px;height:116px}
.sq b{position:absolute;border-radius:99px;background:var(--grn)}
.sq .ground{left:8px;right:8px;bottom:14px;height:3px;background:var(--navbg)}
.sq .head{left:34px;top:24px;width:17px;height:17px}
.sq .bar{left:24px;top:34px;width:42px;height:6px}
.sq .plL{left:22px;top:28px;width:8px;height:18px;border-radius:3px}
.sq .plR{left:60px;top:28px;width:8px;height:18px;border-radius:3px}
.sq .torso{left:52px;top:64px;width:30px;height:10px;transform-origin:left center;transform:rotate(-118deg)} /* hip→shoulder lean */
.sq .thigh{left:52px;top:64px;width:23px;height:11px;transform-origin:left center;transform:rotate(24deg)}
.sq .shin{left:23px;top:0;width:23px;height:11px;transform-origin:left center;transform:rotate(66deg)} /* child of thigh */
.sq .foot{left:18px;top:-3px;width:15px;height:8px;border-radius:3px} /* child of shin */
/* leg press: reclined figure, jointed leg pressing a footplate (horizontal bones) */
.lp{position:relative;width:116px;height:116px}
.lp b{position:absolute;border-radius:99px;background:var(--grn)}
.lp .ground{left:8px;right:8px;bottom:16px;height:3px;background:var(--navbg)}
.lp .head{left:14px;top:40px;width:18px;height:18px}
.lp .torso{left:18px;top:58px;width:34px;height:9px;transform-origin:left center;transform:rotate(-12deg)} /* reclined back */
.lp .thigh{left:46px;top:60px;width:24px;height:9px;transform-origin:left center;transform:rotate(-20deg)}
.lp .shin{left:24px;top:0;width:24px;height:9px;transform-origin:left center;transform:rotate(16deg)} /* child of thigh */
.lp .foot{left:22px;top:-15px;width:8px;height:34px;border-radius:5px;background:var(--grn)} /* child of shin: footplate */
</style></head><body>
<div class="card">
 <div class="lbl">WORKOUT · GYM · PULL-UP</div>
 <div class="stage"><div class="pu">
  <b class="bar"></b><b class="postL"></b><b class="postR"></b>
  <b class="head"></b><b class="torso"></b>
  <b class="thigh"><b class="shin"></b></b>
  <b class="uarm"><b class="farm"><b class="grip"></b></b></b>
 </div></div>
 <div class="name">🤸 Pull-up</div>
</div>
<div class="card">
 <div class="lbl">WORKOUT · GYM · BICEP CURL</div>
 <div class="stage"><div class="cu">
  <b class="ground"></b><b class="legF"></b><b class="legB"></b>
  <b class="torso"></b><b class="head"></b>
  <b class="uarm"></b><b class="forearm"></b>
  <b class="dbbar"></b><b class="dbL"></b><b class="dbR"></b>
 </div></div>
 <div class="name">💪 Bicep curl</div>
</div>
<div class="card">
 <div class="lbl">WORKOUT · GYM · LAT PULLDOWN</div>
 <div class="stage"><div class="lat">
  <div class="pulley"></div><b class="cable"></b><b class="seat"></b><b class="pad"></b>
  <b class="thigh"><b class="shin"></b></b>
  <b class="torso"></b><b class="head"></b>
  <b class="uarm"><b class="farm"></b></b>
  <b class="pbar"></b>
 </div></div>
 <div class="name">🦵 Lat pulldown</div>
</div>
<div class="card">
 <div class="lbl">FALLBACK · SPORT EMOJI PULSE</div>
 <div class="stage"><div class="pulse">🎾</div></div>
 <div class="name">🎾 Padel (until drawn)</div>
</div>
</body></html>
