<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="pjs-local.css">
<style>
:root{--bg:#F7F1E8;--card:#FFFBF4;--bord:#EDE5D3;--navbg:#EFE8DA;--grn:#2E7D5B;--mut:#80796C;--sec:#6B6457;--ink:#1F1C17;--warn:#C2562C}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
body{background:#cfc7b6;display:flex;justify-content:center;padding:24px}
.phone{width:390px;background:var(--bg);border-radius:34px;padding:22px;min-height:760px;box-shadow:0 30px 90px rgba(20,16,10,0.22)}
.hd{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{width:38px;height:38px;border-radius:14px;background:var(--navbg);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink)}
.h1{font-size:28px;font-weight:800;color:var(--ink)}
.sub{font-size:15px;line-height:22px;color:var(--sec);font-weight:500;margin-bottom:18px}
.glabel{font-size:12px;letter-spacing:1.4px;font-weight:800;color:var(--mut);margin:0 0 8px 4px}
.group{background:var(--card);border:1px solid var(--bord);border-radius:22px;padding:0 16px;margin-bottom:20px;box-shadow:0 12px 28px rgba(31,28,23,0.06)}
.row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:2px solid var(--bord)}
.row.last{border-bottom:none}
.ic{width:34px;height:34px;border-radius:11px;background:var(--navbg);display:flex;align-items:center;justify-content:center;font-size:15px}
.lbl{font-size:17px;font-weight:700;color:var(--ink)}
.sm{font-size:12px;font-weight:700;color:var(--mut);margin-top:2px}
.grow{flex:1}
.tog{width:46px;height:27px;border-radius:99px;display:flex;align-items:center}
.tog.on{background:var(--grn);justify-content:flex-end}
.tog.off{background:var(--bord)}
.knob{width:21px;height:21px;border-radius:99px;background:#fff;margin:0 3px}
.stepper{display:flex;align-items:center;gap:8px;margin-top:5px}
.sbtn{width:30px;height:30px;border-radius:9px;background:var(--navbg);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--sec)}
.time{width:64px;text-align:center;font-size:12px;font-weight:700;color:var(--ink)}
.freq{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:2px solid var(--bord)}
.pills{display:flex;gap:8px}
.pill{padding:7px 14px;border-radius:99px;background:var(--navbg);font-size:12px;font-weight:700;color:var(--ink)}
.pill.sel{background:var(--grn);color:#fff}
</style></head><body>
<div class="phone">
  <div class="hd"><div class="back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1F1C17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></div><div class="h1">Reminders</div></div>
  <div class="sub">Gentle nudges, on your schedule. These are local to your phone — no account, no server. Toggle any off anytime.</div>

  <div class="glabel">DAILY REMINDERS</div>
  <div class="group">
    <div class="row"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6457" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.596 12.768a2 2 0 1 0 2.829-2.829l-1.768-1.767a2 2 0 0 0 2.828-2.829l-2.828-2.828a2 2 0 0 0-2.829 2.828l-1.767-1.768a2 2 0 1 0-2.829 2.829z"/><path d="m2.5 21.5 1.4-1.4"/><path d="m20.1 3.9 1.4-1.4"/><path d="M5.343 21.485a2 2 0 1 0 2.829-2.828l1.767 1.768a2 2 0 1 0 2.829-2.829l-6.364-6.364a2 2 0 1 0-2.829 2.829l1.768 1.767a2 2 0 0 0-2.828 2.829z"/><path d="m9.6 14.4 4.8-4.8"/></svg></div><div class="grow"><div class="lbl">Workout</div>
      <div class="stepper"><div class="sbtn">−</div><div class="time">5:30 PM</div><div class="sbtn">+</div></div></div>
      <div class="tog on"><div class="knob"></div></div></div>
    <div class="row"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6457" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg></div><div class="grow"><div class="lbl">Log a meal</div></div><div class="tog off"><div class="knob"></div></div></div>
    <div class="row"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6457" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/><path d="M16 17h4"/><path d="M4 13h4"/></svg></div><div class="grow"><div class="lbl">Step goal</div></div><div class="tog off"><div class="knob"></div></div></div>
    <div class="row"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6457" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg></div><div class="grow"><div class="lbl">Wind down</div>
      <div class="stepper"><div class="sbtn">−</div><div class="time">10:30 PM</div><div class="sbtn">+</div></div></div>
      <div class="tog on"><div class="knob"></div></div></div>
    <div class="row last"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6457" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="m19 8 3 8a5 5 0 0 1-6 0zV7"/><path d="M3 7h1a17 17 0 0 0 8-2 17 17 0 0 0 8 2h1"/><path d="m5 8 3 8a5 5 0 0 1-6 0zV7"/><path d="M7 21h10"/></svg></div><div class="grow"><div class="lbl">Weigh-in</div></div><div class="tog off"><div class="knob"></div></div></div>
  </div>

  <div class="glabel">HYDRATION</div>
  <div class="group">
    <div class="row last" style="padding-bottom:12px"><div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2E7D5B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg></div><div class="grow"><div class="lbl">Drink water</div><div class="sm">Every 2h · 9:00 AM–9:00 PM</div></div><div class="tog on"><div class="knob"></div></div></div>
    <div class="freq"><div style="font-size:15px;font-weight:500;color:var(--sec)">How often</div>
      <div class="pills"><div class="pill">1h</div><div class="pill sel">2h</div><div class="pill">3h</div></div></div>
  </div>
</div>
</body></html>
