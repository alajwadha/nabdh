<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="pjs-local.css"><style>
:root{--bg:#F7F1E8;--card:#FFFBF4;--bord:#EDE5D3;--navbg:#EFE8DA;--grn:#2E7D5B;--deep:#256A4C;--mut:#80796C;--sec:#6B6457;--ink:#1F1C17}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
body{background:#cfc7b6;display:flex;justify-content:center;padding:24px}
.phone{width:392px;background:var(--bg);border-radius:34px;padding:22px;box-shadow:0 30px 90px rgba(20,16,10,.22)}
.hd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.back{width:38px;height:38px;border-radius:14px;background:var(--navbg);display:flex;align-items:center;justify-content:center}
.h1{font-size:28px;font-weight:800;letter-spacing:-.6px;color:var(--ink)}
.cta{display:flex;align-items:center;gap:12px;background:var(--deep);border-radius:24px;padding:16px;margin-bottom:16px}
.cta .t{color:#fff;font-size:17px;font-weight:700;letter-spacing:-.1px} .cta .s{color:rgba(255,255,255,.85);font-size:12px;font-weight:600}
.card{background:var(--card);border:1px solid var(--bord);border-radius:26px;padding:16px;margin-bottom:14px;box-shadow:0 12px 28px rgba(31,28,23,.06)}
.hd2{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.ic{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center}
.t{font-size:11px;letter-spacing:1.2px;font-weight:700;color:var(--mut)}
.bigrow{display:flex;align-items:baseline;gap:6px}
.big{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--ink);font-variant-numeric:tabular-nums}
.sub{font-size:12px;font-weight:600;color:var(--mut)}
.lbtn{margin-top:10px;text-align:center;border:2px solid var(--bord);border-radius:99px;padding:12px;font-size:14px;font-weight:700;color:var(--ink)}
.medhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.add{display:flex;align-items:center;gap:4px;color:var(--grn);font-size:12px;font-weight:700}
.medrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--bord)}
.medrow:first-of-type{border-top:none}
.micon{width:36px;height:36px;border-radius:12px;background:#FBE5BE;display:flex;align-items:center;justify-content:center}
.mname{font-size:16px;font-weight:700;color:var(--ink)} .dose{font-size:12px;font-weight:600;color:var(--mut)}
.msched{font-size:12px;font-weight:600;color:var(--mut)}
.chk{width:34px;height:34px;border-radius:17px;border:2px solid var(--bord);display:flex;align-items:center;justify-content:center}
.chk.on{background:var(--grn);border-color:var(--grn)}
.grow{flex:1}
</style></head><body><div class="phone">
