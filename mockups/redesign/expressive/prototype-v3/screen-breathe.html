<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="pjs-local.css"><style>
:root{--bg:#F7F1E8;--card:#FFFBF4;--bord:#EDE5D3;--navbg:#EFE8DA;--grn:#2E7D5B;--mut:#80796C;--sec:#6B6457;--ink:#1F1C17;--blue:#D6EBF6;--navon:#211E1A;--navtx:#FFF8EC}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
body{background:#cfc7b6;display:flex;justify-content:center;gap:26px;padding:26px}
.phone{width:380px;background:var(--bg);border-radius:34px;padding:22px;box-shadow:0 30px 90px rgba(20,16,10,.22)}
.hd{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.back{width:38px;height:38px;border-radius:14px;background:var(--navbg);display:flex;align-items:center;justify-content:center}
.h1{font-size:28px;font-weight:800;letter-spacing:-.6px;color:var(--ink)}
.ringwrap{position:relative;height:240px;display:flex;align-items:center;justify-content:center;margin-top:6px}
.halo{position:absolute;width:210px;height:210px;border-radius:999px;background:var(--blue);opacity:.45}
.ring{border-radius:999px;background:var(--grn);display:flex;align-items:center;justify-content:center;box-shadow:0 18px 50px rgba(46,125,91,.32)}
.center{position:absolute;text-align:center;color:#fff;display:flex;flex-direction:column;align-items:center;gap:4px}
.cname{font-size:17px;font-weight:700;color:rgba(255,255,255,.95)}
.cd{font-size:56px;font-weight:800;letter-spacing:-2px;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
.lbl{font-size:11px;letter-spacing:1.2px;font-weight:800;color:var(--mut);margin:14px 0 8px 4px}
.pat{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bord);border-radius:18px;padding:12px;margin-bottom:8px}
.pat.sel{border:2px solid var(--grn)}
.pic{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.pn{font-size:16px;font-weight:700;color:var(--ink)} .pnote{font-size:12px;font-weight:600;color:var(--mut)}
.pgrow{flex:1}
.seg{position:relative;display:flex;background:var(--navbg);border-radius:99px;padding:4px;margin:12px 0}
.seg .ind{position:absolute;top:4px;bottom:4px;border-radius:99px;background:var(--navon)}
.seg .s{flex:1;text-align:center;padding:9px 0;font-size:12.5px;font-weight:700;z-index:1}
.seg .s.on{color:var(--navtx)} .seg .s.off{color:var(--mut)}
.btn{background:var(--grn);color:#fff;border-radius:99px;padding:15px;text-align:center;font-size:17px;font-weight:700}
.line{border:2px solid var(--bord);color:var(--ink);background:none;border-radius:99px;padding:14px;text-align:center;font-size:15px;font-weight:700}
.tl{text-align:center;font-size:12px;font-weight:700;color:var(--mut);margin:14px 0 12px}
</style></head><body>
<div class="phone">
<div class="hd"><div class="back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1F1C17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></div><div class="h1">Breathe</div></div>
<div class="ringwrap"><div class="halo"></div><div class="ring" style="width:138px;height:138px"></div><div class="center"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg><div class="cname">Box</div></div></div>
<div class="lbl">PATTERN</div>
<div class="pat sel"><div class="pic" style="background:#2E7D5B"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg></div><div class="pgrow"><div class="pn">Box</div><div class="pnote">Even 4-4-4-4 — steady focus & calm.</div></div></div>
<div class="pat "><div class="pic" style="background:#EFE8DA"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6457" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg></div><div class="pgrow"><div class="pn">4-7-8</div><div class="pnote">Long exhale — wind down for sleep.</div></div></div>
<div class="pat "><div class="pic" style="background:#EFE8DA"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B6457" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg></div><div class="pgrow"><div class="pn">Coherence</div><div class="pnote">5-5 — balances heart-rate variability.</div></div></div>
<div class="seg"><div class="ind" style="left:calc(4px + (100% - 8px)/3);width:calc((100% - 8px)/3)"></div><div class="s off">1 min</div><div class="s on">3 min</div><div class="s off">5 min</div></div>
<div class="btn">Start</div>
</div>
<div class="phone">
<div class="hd"><div class="back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1F1C17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></div><div class="h1">Breathe</div></div>
<div class="ringwrap"><div class="halo"></div><div class="ring" style="width:193px;height:193px"></div><div class="center"><div class="cd">3</div><div class="cname">Inhale</div></div></div>
<div class="tl">2:41 left · Box</div>
<div class="line">End session</div>
</div>
</body></html>
