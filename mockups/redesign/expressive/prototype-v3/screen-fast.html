<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="pjs-local.css"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
body{background:#cfc7b6;display:flex;justify-content:center;padding:26px}
.phone{width:392px;background:#F7F1E8;border-radius:34px;padding:22px;box-shadow:0 30px 90px rgba(20,16,10,.22)}
.hd{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.back{width:38px;height:38px;border-radius:14px;background:#EFE8DA;display:flex;align-items:center;justify-content:center}
.h1{font-size:27px;font-weight:800;letter-spacing:-.6px;color:#1F1C17}
.ringwrap{position:relative;height:256px;display:flex;align-items:center;justify-content:center}
.center{position:absolute;text-align:center;display:flex;flex-direction:column;align-items:center}
.kick{display:flex;align-items:center;gap:6px}
.klbl{font-size:11px;letter-spacing:1.2px;font-weight:700;color:#80796C}
.big{font-size:46px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;color:#2E7D5B;font-variant-numeric:tabular-nums}
.sub{font-size:12px;font-weight:600;color:#80796C;margin-top:2px}
.card{background:#D8EFE2;border-radius:22px;padding:16px;margin:14px 0;display:flex;align-items:center;gap:13px;box-shadow:0 6px 16px rgba(58,46,26,.08)}
.ctitle{font-size:16px;font-weight:700;color:#1E5A40}
.csub{font-size:12px;font-weight:600;color:#1E5A40;opacity:.9;margin-top:1px}
.line{border:2px solid #EDE5D3;color:#1F1C17;border-radius:99px;padding:14px;text-align:center;font-size:15px;font-weight:700}
</style></head><body>
<div class="phone">
  <div class="hd"><div class="back"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1F1C17" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></div><div class="h1">Fasting</div></div>
  <div class="ringwrap"><svg width="248" height="248">
  <circle cx="124.0" cy="124.0" r="114.0" fill="none" stroke="#EFE8DA" stroke-width="20"/>
  <path d="M124.0,10.0 A114.0,114.0 0 1 1 46.0,207.1" fill="none" stroke="#2E7D5B" stroke-width="20" stroke-linecap="round"/>
</svg>
    <div class="center">
      <div class="kick"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2E7D5B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg><span class="klbl">FASTING</span></div>
      <div class="big">9:54:12</div>
      <div class="sub">until your eating window</div>
    </div>
  </div>
  <div class="card"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1E5A40" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2L14 2"/><path d="M12 14L15 11"/><path d="M4.0 14.0a8.0 8.0 0 1 0 16.0 0a8.0 8.0 0 1 0 -16.0 0"/></svg><div style="flex:1"><div class="ctitle">16:8 plan</div><div class="csub">Eat at 12:00 PM · 62% through</div></div></div>
  <div class="line">End fast</div>
</div>
</body></html>
