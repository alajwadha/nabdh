<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="pjs-local.css"><style>
:root{--bg:#F7F1E8;--card:#FFFBF4;--bord:#EDE5D3;--navbg:#EFE8DA;--grn:#2E7D5B;--mut:#80796C;--sec:#6B6457;--ink:#1F1C17}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
body{background:#cfc7b6;display:flex;justify-content:center;padding:24px}
.phone{width:390px;background:var(--bg);border-radius:34px;padding:22px;box-shadow:0 30px 90px rgba(20,16,10,.22)}
.grab{width:44px;height:5px;border-radius:99px;background:var(--bord);margin:0 auto 16px}
.h1{font-size:28px;font-weight:800;letter-spacing:-.6px;color:var(--ink);margin-bottom:4px}
.sub{font-size:13px;font-weight:600;color:var(--mut);margin-bottom:16px}
.group{background:var(--card);border:1px solid var(--bord);border-radius:22px;padding:0 16px;box-shadow:0 12px 28px rgba(31,28,23,.06)}
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:2px solid var(--bord)}
.row.last{border-bottom:none}
.ic{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center}
.lbl{font-size:16px;font-weight:700;letter-spacing:-.1px;color:var(--ink)}
.sm{font-size:12px;font-weight:600;color:var(--mut);margin-top:1px}
.grow{flex:1}
.tog{width:46px;height:27px;border-radius:99px;display:flex;align-items:center}
.tog.on{background:var(--grn);justify-content:flex-end} .tog.off{background:var(--bord)}
.knob{width:21px;height:21px;border-radius:99px;background:#fff;margin:0 3px;box-shadow:0 1px 3px rgba(0,0,0,.18)}
</style></head><body><div class="phone">
<div class="grab"></div><div class="h1">Customize today</div><div class="sub">Choose the metrics that matter to you</div>
<div class="group"><div class="row "><div class="ic" style="background:#F8DCE4"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A3A52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"/></svg></div><div class="grow"><div class="lbl">Resting heart rate</div><div class="sm">58 bpm</div></div><div class="tog on"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#DDD6F6"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A4080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg></div><div class="grow"><div class="lbl">Heart-rate variability</div><div class="sm">62 ms</div></div><div class="tog on"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#D6EBF6"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2C5C77" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg></div><div class="grow"><div class="lbl">Sleep</div><div class="sm">7h 20m</div></div><div class="tog on"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#D8EFE2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E5A40" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/><path d="M16 17h4"/><path d="M4 13h4"/></svg></div><div class="grow"><div class="lbl">Steps</div><div class="sm">8,420</div></div><div class="tog on"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#F7E3C2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B5328" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18V5"/><path d="M15 13a4.17 4.17 0 0 1-3-4 4.17 4.17 0 0 1-3 4"/><path d="M17.598 6.5A3 3 0 1 0 12 5a3 3 0 1 0-5.598 1.5"/><path d="M17.997 5.125a4 4 0 0 1 2.526 5.77"/><path d="M18 18a4 4 0 0 0 2-7.464"/><path d="M19.967 17.483A4 4 0 1 1 12 18a4 4 0 1 1-7.967-.517"/><path d="M6 18a4 4 0 0 1-2-7.464"/><path d="M6.003 5.125a4 4 0 0 0-2.526 5.77"/></svg></div><div class="grow"><div class="lbl">Stress</div><div class="sm">Low</div></div><div class="tog off"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#F8DCE4"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7A3A52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></svg></div><div class="grow"><div class="lbl">Blood oxygen</div><div class="sm">98%</div></div><div class="tog off"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#D6EBF6"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2C5C77" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg></div><div class="grow"><div class="lbl">Respiration</div><div class="sm">14 /min</div></div><div class="tog off"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#FBE5BE"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A6312" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3q1 4 4 6.5t3 5.5a1 1 0 0 1-14 0 5 5 0 0 1 1-3 1 1 0 0 0 5 0c0-2-1.5-3-1.5-5q0-2 2.5-4"/></svg></div><div class="grow"><div class="lbl">Active energy</div><div class="sm">540 kcal</div></div><div class="tog off"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#D6EBF6"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2C5C77" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg></div><div class="grow"><div class="lbl">Hydration</div><div class="sm">6 / 8</div></div><div class="tog on"><div class="knob"></div></div></div>
<div class="row "><div class="ic" style="background:#D8EFE2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1E5A40" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg></div><div class="grow"><div class="lbl">VO₂ max</div><div class="sm">46</div></div><div class="tog off"><div class="knob"></div></div></div>
<div class="row last"><div class="ic" style="background:#DDD6F6"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4A4080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg></div><div class="grow"><div class="lbl">Resilience</div><div class="sm">Adequate</div></div><div class="tog off"><div class="knob"></div></div></div>
</div></div></body></html>
