<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0F14;--s1:#141A21;--s2:#1A2129;--bd:#232C36;--t1:#F3F6F8;--t2:#9AA7B3;--t3:#5A6675;--mint:#36E2B4}
html,body{width:412px;height:940px;background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.wrap{padding:54px 24px 0}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(.9)}60%{opacity:1;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes ringDraw{from{stroke-dashoffset:622}to{stroke-dashoffset:137}}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes fade{to{opacity:1}}
/* resting (pre-animation) states */
.top,.hi,.num,.lbl,.card,.coach{opacity:0}
.state{opacity:0}
.prog{stroke-dashoffset:622}
.line{stroke-dasharray:320;stroke-dashoffset:320}
.area{opacity:0}
/* triggered animations */
body.go .top{animation:fadeDown .6s ease-out forwards}
body.go .hi{animation:fadeDown .6s .1s ease-out forwards}
body.go .prog{animation:ringDraw 1.5s .3s cubic-bezier(.22,1,.36,1) forwards}
body.go .num{animation:fade .4s .35s ease forwards}
body.go .lbl{animation:fade .5s .7s ease forwards}
body.go .state{animation:pop .55s 1.15s cubic-bezier(.22,1,.36,1) forwards}
body.go .card{animation:fadeUp .6s ease-out forwards}
body.go .card:nth-child(1){animation-delay:.55s}body.go .card:nth-child(2){animation-delay:.65s}
body.go .card:nth-child(3){animation-delay:.75s}body.go .card:nth-child(4){animation-delay:.85s}
body.go .line{animation:draw 1.1s ease-out forwards}
body.go .area{animation:fade .9s ease-out forwards}
body.go .card:nth-child(1) .line{animation-delay:.7s}body.go .card:nth-child(1) .area{animation-delay:.8s}
body.go .card:nth-child(2) .line{animation-delay:.8s}body.go .card:nth-child(2) .area{animation-delay:.9s}
body.go .card:nth-child(3) .line{animation-delay:.9s}body.go .card:nth-child(3) .area{animation-delay:1.0s}
body.go .card:nth-child(4) .line{animation-delay:1.0s}body.go .card:nth-child(4) .area{animation-delay:1.1s}
body.go .coach{animation:fadeUp .6s 1.35s ease-out forwards}
.logo{font-weight:700;font-size:21px}.logo b{color:var(--mint)}
.date{color:var(--t3);font-size:12px;font-weight:600;letter-spacing:1px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.hi{font-size:15px;color:var(--t2);margin-bottom:14px}.hi b{color:var(--t1);font-weight:600}
.hero{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
.ring{position:relative;width:228px;height:228px}
.prog{filter:drop-shadow(0 0 7px rgba(54,226,180,.45))}
.score{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.num{font-size:72px;font-weight:300;line-height:1;letter-spacing:-3px}
.lbl{font-size:11px;letter-spacing:3px;color:var(--t2);margin-top:8px}
.state{margin-top:16px;font-size:13px;color:var(--mint);font-weight:600;background:rgba(54,226,180,.1);border:1px solid rgba(54,226,180,.22);padding:7px 15px;border-radius:999px}
.vit{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:linear-gradient(180deg,var(--s2),var(--s1));border:1px solid var(--bd);border-radius:18px;padding:15px 16px}
.cl{font-size:12px;color:var(--t3);margin-bottom:7px;letter-spacing:.3px}
.cv{font-size:25px;font-weight:600;letter-spacing:-.5px}.cv small{font-size:12px;color:var(--t3);font-weight:400;margin-left:3px}
.spark{margin-top:6px;display:block}
.coach{background:linear-gradient(135deg,rgba(54,226,180,.14),rgba(31,158,134,.04));border:1px solid rgba(54,226,180,.22);border-radius:18px;padding:15px 16px;display:flex;gap:12px;align-items:flex-start}
.av{width:30px;height:30px;border-radius:50%;flex:none;background:linear-gradient(135deg,#36E2B4,#1F9E86);display:flex;align-items:center;justify-content:center;font-size:15px}
.tx{font-size:13.5px;line-height:1.5;color:var(--t1)}.tx b{color:var(--mint);font-weight:600}
</style></head><body>
<svg width="0" height="0" style="position:absolute"><defs>
 <linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#36E2B4"/><stop offset="1" stop-color="#1C8E78"/></linearGradient>
 <linearGradient id="sa" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#36E2B4" stop-opacity=".32"/><stop offset="1" stop-color="#36E2B4" stop-opacity="0"/></linearGradient>
 <linearGradient id="sb" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7C8CFF" stop-opacity=".32"/><stop offset="1" stop-color="#7C8CFF" stop-opacity="0"/></linearGradient>
</defs></svg>
<div class="wrap">
<div class="top"><div class="logo">Nabdh<b>.</b></div><div class="date">MON · 11 JUN</div></div>
<div class="hi">Good morning, <b>Ali</b></div>
<div class="hero">
 <div class="ring"><svg width="228" height="228" viewBox="0 0 228 228">
  <circle cx="114" cy="114" r="99" fill="none" stroke="#1A222C" stroke-width="13"/>
  <circle class="prog" cx="114" cy="114" r="99" fill="none" stroke="url(#rg)" stroke-width="13" stroke-linecap="round" stroke-dasharray="622" transform="rotate(-90 114 114)"/>
 </svg><div class="score"><div class="num" id="num">0</div><div class="lbl">READINESS</div></div></div>
 <div class="state">Ready to push · ▲ 6 vs yesterday</div>
</div>
<div class="vit">
 <div class="card"><div class="cl">Resting HR</div><div class="cv">58<small>bpm</small></div><svg class="spark" width="150" height="32" viewBox="0 0 150 32"><path class="area" d="M0,20 L25,16 L50,18 L75,11 L100,14 L125,7 L150,10 L150,32 L0,32 Z" fill="url(#sa)"/><path class="line" d="M0,20 L25,16 L50,18 L75,11 L100,14 L125,7 L150,10" fill="none" stroke="#36E2B4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
 <div class="card"><div class="cl">HRV</div><div class="cv">48<small>ms</small></div><svg class="spark" width="150" height="32" viewBox="0 0 150 32"><path class="area" d="M0,16 L25,20 L50,12 L75,17 L100,9 L125,13 L150,7 L150,32 L0,32 Z" fill="url(#sa)"/><path class="line" d="M0,16 L25,20 L50,12 L75,17 L100,9 L125,13 L150,7" fill="none" stroke="#36E2B4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
 <div class="card"><div class="cl">Sleep</div><div class="cv">7.3<small>h</small></div><svg class="spark" width="150" height="32" viewBox="0 0 150 32"><path class="area" d="M0,12 L25,15 L50,9 L75,17 L100,13 L125,10 L150,8 L150,32 L0,32 Z" fill="url(#sb)"/><path class="line" d="M0,12 L25,15 L50,9 L75,17 L100,13 L125,10 L150,8" fill="none" stroke="#7C8CFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
 <div class="card"><div class="cl">Steps</div><div class="cv">8,432</div><svg class="spark" width="150" height="32" viewBox="0 0 150 32"><path class="area" d="M0,22 L25,18 L50,19 L75,13 L100,15 L125,9 L150,6 L150,32 L0,32 Z" fill="url(#sa)"/><path class="line" d="M0,22 L25,18 L50,19 L75,13 L100,15 L125,9 L150,6" fill="none" stroke="#36E2B4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
</div>
<div class="coach"><div class="av">💡</div><div class="tx"><b>Heads up —</b> your sleep dipped 3 nights running. Go lighter on training today and aim for an earlier night.</div></div>
</div>
<script>
window.NABDH=(function(){var raf;
 function startCount(){cancelAnimationFrame(raf);var el=document.getElementById('num');el.textContent='0';var start=performance.now(),dur=1300,delay=350,target=78;
  (function tick(now){var t=Math.min(1,Math.max(0,(now-start-delay)/dur));var e=1-Math.pow(1-t,3);el.textContent=Math.round(e*target);if(t<1)raf=requestAnimationFrame(tick);})(performance.now());}
 function play(){var b=document.body;b.classList.remove('go');void b.offsetWidth;b.classList.add('go');startCount();}
 return {play:play};})();
(document.fonts&&document.fonts.ready)?document.fonts.ready.then(window.NABDH.play):window.addEventListener('load',window.NABDH.play);
</script>
</body></html>
