<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080B10;--t1:#FFFFFF;--t2:#AEB8C4;--t3:#6A7682;--glass:rgba(255,255,255,.07);--bd:rgba(255,255,255,.12)}
html,body{width:412px;height:940px;background:var(--bg);color:var(--t1);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{padding:54px 22px 0}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-weight:700;font-size:21px}.logo b{color:#36E2B4}
.date{color:var(--t3);font-size:12px;font-weight:600;letter-spacing:1px}
.hero{position:relative;border-radius:28px;padding:26px;overflow:hidden;background:linear-gradient(135deg,#0FB89A 0%,#1FA0C6 48%,#6D6BE6 100%);margin-bottom:16px;box-shadow:0 20px 50px -20px rgba(31,160,198,.6)}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(80% 60% at 80% 0%,rgba(255,255,255,.25),transparent 60%)}
.hl{position:relative;font-size:12px;letter-spacing:2px;opacity:.85;font-weight:600}
.hn{position:relative;font-size:82px;font-weight:600;letter-spacing:-3px;line-height:1;margin-top:6px}
.hs{position:relative;font-size:14px;opacity:.9;margin-top:6px}
.hr{position:relative;display:flex;gap:10px;margin-top:22px}
.chip{flex:1;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.22);border-radius:16px;padding:12px}
.ck{font-size:11px;opacity:.85}.cvv{font-size:20px;font-weight:700;margin-top:3px}.cvv small{font-size:11px;opacity:.8;font-weight:400}
.grid{display:flex;gap:12px;margin-bottom:16px}
.gc{flex:1;background:var(--glass);border:1px solid var(--bd);border-radius:20px;padding:16px;backdrop-filter:blur(8px)}
.gk{font-size:12px;color:var(--t3);margin-bottom:8px}
.gv{font-size:24px;font-weight:600;letter-spacing:-.5px}.gv small{font-size:12px;color:var(--t3);font-weight:400}
.coach{background:var(--glass);border:1px solid var(--bd);border-radius:20px;padding:16px;display:flex;gap:11px;align-items:flex-start;backdrop-filter:blur(8px)}
.coach .ic{font-size:17px}.coach .tx{font-size:13.5px;line-height:1.5;color:var(--t2)}.coach .tx b{color:#36E2B4}
</style></head><body><div class="wrap">
<div class="top"><div class="logo">Nabdh<b>.</b></div><div class="date">MON · 11 JUN</div></div>
<div class="hero">
 <div class="hl">READINESS</div>
 <div class="hn">78</div>
 <div class="hs">Ready to push · ▲ 6 vs yesterday</div>
 <div class="hr">
  <div class="chip"><div class="ck">Steps</div><div class="cvv">8,432</div></div>
  <div class="chip"><div class="ck">Energy</div><div class="cvv">612<small> kcal</small></div></div>
  <div class="chip"><div class="ck">Sleep</div><div class="cvv">7.3<small> h</small></div></div>
 </div>
</div>
<div class="grid">
 <div class="gc"><div class="gk">Resting HR</div><div class="gv">58<small> bpm</small></div></div>
 <div class="gc"><div class="gk">HRV</div><div class="gv">48<small> ms</small></div></div>
 <div class="gc"><div class="gk">SpO₂</div><div class="gv">98<small> %</small></div></div>
</div>
<div class="coach"><div class="ic">💡</div><div class="tx"><b>Coach —</b> sleep dipped 3 nights. Go lighter today; I've eased your plan and set a suhoor hydration reminder.</div></div>
</div></body></html>
